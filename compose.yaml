services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: random_phitruong
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - random_phitruong_postgres:/var/lib/postgresql/data

volumes:
  random_phitruong_postgres:
